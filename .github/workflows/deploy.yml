name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX set in build-and-push (GHCR image path must be lowercase)

jobs:
  # ─── Test Suite ────────────────────────────────────────────────────────────
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test
        env:
          JWT_SECRET: ci_test_secret_not_for_production
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          NODE_ENV: test

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run Vitest
        working-directory: client
        run: npm test

  test-ml:
    name: ML Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install ml-service deps
        working-directory: ml-service
        run: pip install -r requirements-ci.txt

      - name: Run pytest
        working-directory: ml-service
        run: pytest test_health.py -v

  test-genai:
    name: Gen-AI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install gen-ai deps
        working-directory: gen-ai-service
        run: pip install -r requirements-ci.txt

      - name: Run pytest
        working-directory: gen-ai-service
        run: pytest test_health.py -v

  # ─── Build + Push Docker Images ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [test-server, test-client, test-ml, test-genai]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: core-api
            context: ./server
          - name: ml-service
            context: ./ml-service
          - name: gen-ai-service
            context: ./gen-ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix (GHCR requires lowercase)
        run: |
          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=${OWNER_LC}/finsocial" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }}

  # ─── Deploy Client to Vercel ─────────────────────────────────────────────────
  deploy-client:
    name: Deploy Client → Vercel
    runs-on: ubuntu-latest
    needs: [test-client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

      # Pin modern CLI (API requires 47+). amondnet/vercel-action@v25 bundled Vercel 25.x and broke deploys.
      # Deploy from repo root: Vercel project "Root Directory" is `client` — running inside `client/` double-resolves to `client/client`.
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@54 deploy --prod --yes

  # ─── Deploy Render services (core-api, ml-service, gen-ai-service) ───────────
  deploy-render:
    name: Deploy ${{ matrix.service }} → Render
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service: [core-api, ml-service, gen-ai-service]

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          case "${{ matrix.service }}" in
            core-api)       SERVICE_ID="${{ secrets.RENDER_SERVICE_ID_API }}" ;;
            ml-service)     SERVICE_ID="${{ secrets.RENDER_SERVICE_ID_ML }}" ;;
            gen-ai-service) SERVICE_ID="${{ secrets.RENDER_SERVICE_ID_GENAI }}" ;;
          esac

          if [ -z "$SERVICE_ID" ]; then
            echo "Skipping ${{ matrix.service }}: Render service ID secret not set."
            exit 0
          fi

          if [ -z "$RENDER_API_KEY" ]; then
            echo "Skipping ${{ matrix.service }}: RENDER_API_KEY not set."
            exit 0
          fi

          echo "Deploying ${{ matrix.service }} (service id ${SERVICE_ID:0:8}…)"
          curl -sfS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -d '{"clearCache":"do_not_clear"}'
